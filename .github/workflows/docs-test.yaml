name: Test Docs Deployment

on:
    pull_request:
        branches:
            - main
        paths:
            - 'docs/**'
            - 'README.md'
            - 'CHANGELOG.md'
            - 'CONTRIBUTING.md'
            - 'package.json'
            - '.github/workflows/docs.yml'
            - '.github/workflows/docs-test.yaml'

jobs:
    test-deploy:
        name: Test deployment
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v5
                with:
                    fetch-depth: 0
            -   uses: actions/setup-node@v5
                with:
                    node-version: 20
                    cache: npm

            -   name: Install dependencies
                run: |
                    npm ci
                    npm install @docusaurus/core@3.10.1 @docusaurus/module-type-aliases@3.10.1 @docusaurus/preset-classic@3.10.1 @docusaurus/tsconfig@3.10.1 @docusaurus/types@3.10.1 @docusaurus/theme-mermaid@3.10.1 @mermaid-js/layout-elk@0.1.9
            
            -   name: Test build website
                run: npm run docs:build