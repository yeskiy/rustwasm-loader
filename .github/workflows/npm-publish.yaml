name: Node.js Package

on:
    release:
        types: [ published ]

jobs:  
    publish-npm:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v5
            -   uses: actions/setup-node@v5
                with:
                    node-version: 20
                    registry-url: https://registry.npmjs.org/
            -   run: npm ci
            -   run: npm publish
                env:
                    NODE_AUTH_TOKEN: ${{secrets.npm_token}}